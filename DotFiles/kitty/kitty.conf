# --- Theme ---
# BEGIN_KITTY_THEME
include themes/noctalia.conf
# END_KITTY_THEME

# --- Font ---
font_family JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# --- Window Layout ---
# Matches padding: {x=7, y=5}
window_padding_width 5 7

# --- Transparency & Blur ---
background_opacity 0.65
background_blur    1

# Faster key repeat
repeat_delay 250
repeat_rate 35

# Better URL handling - click to open
detect_urls yes
url_style curly

# Copy on select (like most Linux terminals)
copy_on_select yes

# Scrollback buffer
scrollback_lines 10000

# Smoother rendering on Wayland
linux_display_server wayland

# Window title shows current directory/process
title_template "{title}"

# Slightly better font rendering
font_features JetBrainsMonoNFM-Regular +liga +calt
