[config]

[templates.yazi]
input_path  = "~/.config/noctalia/templates/yazi-theme.toml"
output_path = "~/.config/yazi/theme.toml"

[templates.kitty]
input_path  = "~/.config/noctalia/templates/kitty.conf"
output_path = "~/.config/kitty/themes/noctalia.conf"
post_hook   = "pkill -SIGUSR1 kitty"
#post_hook   = "kill -SIGUSR1 $(pidof kitty) 2>/dev/null || true"

[templates.alacritty]
input_path  = "~/.config/noctalia/templates/alacritty.toml"
output_path = "~/.config/alacritty/themes/noctalia.toml"
#output_path = "~/.config/alacritty/colors.toml"

